<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Rotation Task</title>

  <!-- jsPsych 7 -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

  <!-- DataPipe plugin (saves data to OSF) -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap');

    .jspsych-content {
      font-family: 'DM Mono', monospace;
      max-width: 600px;
    }

    .instructions {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      color: #2a2a2a;
      font-size: 20px;
      line-height: 1.6;
      text-align: center;
      padding: 40px 20px;
    }
    .instructions h1 { font-size: 36px; margin-bottom: 24px; font-weight: 500; }
    .instructions p { margin-bottom: 16px; }
    .instructions .subtle { font-size: 14px; color: #999; font-family: 'DM Mono', monospace; }

    .task-wrapper {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; padding: 20px;
      user-select: none; -webkit-user-select: none;
    }
    .task-header { text-align: center; }
    .task-title {
      font-family: 'Fraunces', serif; font-size: 32px; font-weight: 300;
      color: #2a2a2a; margin: 0 0 4px 0;
    }
    .task-subtitle { font-size: 13px; color: #999; margin: 0; }

    .progress-track {
      width: 100%; max-width: 360px; height: 3px;
      background: #eee; border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #95B8A3;
      border-radius: 2px; transition: width 0.4s ease;
    }

    .circle-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; width: 100%; max-width: 360px;
    }
    .circle-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }

    .circle-btn {
      position: relative; width: 72px; height: 72px;
      border: none; background: none; cursor: pointer; padding: 0;
      -webkit-tap-highlight-color: transparent; outline: none;
    }
    .circle-btn:disabled { cursor: default; opacity: 0.45; }

    .circle-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .circle-inner {
      position: absolute; top: 8px; left: 8px; width: 56px; height: 56px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .circle-notch {
      position: absolute; top: 3px; left: 50%; transform: translateX(-50%);
      width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.7);
    }
    .circle-icon { font-size: 20px; color: rgba(255,255,255,0.85); }
    .circle-label { font-size: 11px; color: #aaa; }

    .task-status {
      font-family: 'Fraunces', serif; font-size: 15px; font-weight: 300;
      color: #666; text-align: center; min-height: 22px;
    }
    .task-timer { font-size: 12px; color: #bbb; text-align: center; }

    .finish-btn {
      margin-top: 8px; padding: 10px 28px;
      font-family: 'DM Mono', monospace; font-size: 13px;
      color: #999; background: none; border: 1px solid #ddd;
      border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .finish-btn:hover { color: #555; border-color: #aaa; }

    @keyframes popIn {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .celebrating .circle-inner { animation: popIn 0.5s ease; }

    .end-screen {
      font-family: 'Fraunces', serif; text-align: center; padding: 40px 20px;
    }
    .end-screen h1 { font-size: 32px; font-weight: 300; margin-bottom: 24px; color: #2a2a2a; }
    .end-screen .stat {
      font-family: 'DM Mono', monospace; font-size: 14px;
      color: #777; margin-bottom: 8px;
    }
    .end-screen .stat strong { color: #2a2a2a; font-weight: 400; }
  </style>
</head>
<body></body>
<script>

/* ═══════════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════════ */

var DATAPIPE_EXPERIMENT_ID = "9ba4v";  // Your DataPipe experiment ID
var MIN_ROUNDS = 1;
var TIME_LIMIT_MS = 0;

/* ═══════════════════════════════════════════════════════════════
   CUSTOM PLUGIN: circle-rotation
   ═══════════════════════════════════════════════════════════════ */

var jsPsychCircleRotation = (function () {

  var COLORS = [
    "#D4726A", "#E8A87C", "#95B8A3", "#6B8F7E",
    "#B8860B", "#A0522D", "#7B9EBE", "#C4A882"
  ];
  var ICONS = ["◐", "◑", "◒", "◓", "◔", "◕", "◖", "◗"];
  var TOTAL_CIRCLES = 8;
  var CLICKS_PER_CIRCLE = 4;

  var info = {
    name: "circle-rotation",
    parameters: {
      min_rounds: { type: 1, default: 1 },
      time_limit_ms: { type: 1, default: 0 }
    }
  };

  class CircleRotationPlugin {
    constructor(jsPsych) { this.jsPsych = jsPsych; }

    trial(display_element, trial) {
      var self = this;
      var circles = [];
      for (var i = 0; i < TOTAL_CIRCLES; i++) circles.push(0);

      var roundsCompleted = 0;
      var celebrating = false;
      var startTime = performance.now();
      var roundTimestamps = [];

      function elapsed() { return performance.now() - startTime; }

      function formatTime(ms) {
        var s = Math.floor(ms / 1000);
        var m = Math.floor(s / 60);
        var sec = s % 60;
        return m + ":" + (sec < 10 ? "0" : "") + sec;
      }

      function doneCount() {
        var c = 0;
        for (var i = 0; i < TOTAL_CIRCLES; i++) {
          if (circles[i] >= CLICKS_PER_CIRCLE) c++;
        }
        return c;
      }

      function render() {
        var dc = doneCount();
        var pct = (dc / TOTAL_CIRCLES) * 100;
        var showFinish = roundsCompleted >= trial.min_rounds;

        var html = '<div class="task-wrapper">';
        html += '<div class="task-header">' +
          '<h2 class="task-title">покрути</h2>' +
          '<p class="task-subtitle">раунд ' + (roundsCompleted + 1) + '</p></div>';
        html += '<div class="progress-track">' +
          '<div class="progress-fill" style="width:' + pct + '%"></div></div>';

        html += '<div class="circle-grid' + (celebrating ? ' celebrating' : '') + '">';
        for (var i = 0; i < TOTAL_CIRCLES; i++) {
          var clicks = circles[i];
          var done = clicks >= CLICKS_PER_CIRCLE;
          var rotation = clicks * 90;
          var progress = clicks / CLICKS_PER_CIRCLE;
          var dashLen = progress * 264;

          html += '<div class="circle-cell">' +
            '<button class="circle-btn" data-index="' + i + '"' +
            (done || celebrating ? ' disabled' : '') + '>' +
            '<svg class="circle-ring" viewBox="0 0 100 100">' +
            '<circle cx="50" cy="50" r="42" fill="none" stroke="#eee" stroke-width="4"/>' +
            '<circle cx="50" cy="50" r="42" fill="none" stroke="' + COLORS[i] + '"' +
            ' stroke-width="4" stroke-dasharray="' + dashLen + ' 264"' +
            ' stroke-linecap="round" transform="rotate(-90 50 50)"' +
            ' style="transition:stroke-dasharray 0.4s ease"/></svg>' +
            '<div class="circle-inner" style="background:' + COLORS[i] +
            '; transform:rotate(' + rotation + 'deg)">' +
            '<div class="circle-notch"></div>' +
            '<span class="circle-icon">' + ICONS[i] + '</span></div></button>' +
            '<span class="circle-label">' + (done ? '✓' : clicks + '/' + CLICKS_PER_CIRCLE) + '</span></div>';
        }
        html += '</div>';

        var statusText = celebrating ? '✨ ещё раз!'
          : dc === 0 ? 'нажимай на кружочки'
          : 'осталось ' + (TOTAL_CIRCLES - dc);
        html += '<p class="task-status">' + statusText + '</p>';
        html += '<p class="task-timer" id="crt-timer">' + formatTime(elapsed()) + '</p>';

        if (showFinish) {
          html += '<button class="finish-btn" id="crt-finish">Завершить</button>';
        }
        html += '</div>';
        display_element.innerHTML = html;

        var btns = display_element.querySelectorAll('.circle-btn:not([disabled])');
        for (var j = 0; j < btns.length; j++) {
          btns[j].addEventListener('click', handleCircleClick);
        }
        var finishBtn = display_element.querySelector('#crt-finish');
        if (finishBtn) finishBtn.addEventListener('click', endTask);
      }

      function handleCircleClick(e) {
        var idx = parseInt(e.currentTarget.getAttribute('data-index'));
        if (circles[idx] >= CLICKS_PER_CIRCLE || celebrating) return;
        circles[idx]++;

        if (doneCount() === TOTAL_CIRCLES) {
          celebrating = true;
          roundsCompleted++;
          roundTimestamps.push(Math.round(elapsed()));
          render();
          setTimeout(function () {
            for (var i = 0; i < TOTAL_CIRCLES; i++) circles[i] = 0;
            celebrating = false;
            render();
          }, 1200);
        } else {
          render();
        }
      }

      function endTask() {
        clearInterval(timerInterval);
        if (timeLimitTimeout) clearTimeout(timeLimitTimeout);
        var totalTime = Math.round(elapsed());

        self.jsPsych.finishTrial({
          rounds_completed: roundsCompleted,
          total_time_ms: totalTime,
          total_time_formatted: formatTime(totalTime),
          round_timestamps_ms: JSON.stringify(roundTimestamps)
        });
      }

      var timerInterval = setInterval(function () {
        var el = display_element.querySelector('#crt-timer');
        if (el) el.textContent = formatTime(elapsed());
      }, 1000);

      var timeLimitTimeout = null;
      if (trial.time_limit_ms > 0) {
        timeLimitTimeout = setTimeout(endTask, trial.time_limit_ms);
      }

      render();
    }
  }

  CircleRotationPlugin.info = info;
  return CircleRotationPlugin;
})();


/* ═══════════════════════════════════════════════════════════════
   EXPERIMENT TIMELINE
   ═══════════════════════════════════════════════════════════════ */

var jsPsych = initJsPsych();

// Unique filename per participant → each gets their own CSV on OSF
var subject_id = jsPsych.randomization.randomID(10);
var filename = subject_id + ".csv";

/* ── 1. Welcome ── */
var welcome = {
  type: jsPsychHtmlButtonResponse,
  stimulus:
    '<div class="instructions">' +
    '<h1>Добро пожаловать</h1>' +
    '<p>В этом задании вы увидите 8 кружочков.</p>' +
    '<p>Нажимайте на каждый кружочек, чтобы повернуть его на 90°.<br>' +
    'Ваша задача — повернуть все кружочки на полный оборот (360°).</p>' +
    '<p>После этого задание повторится.</p>' +
    '<p>Когда захотите закончить, нажмите кнопку «Завершить».</p>' +
    '<p class="subtle">Нажмите «Начать», когда будете готовы.</p>' +
    '</div>',
  choices: ['Начать']
};

/* ── 2. Circle rotation task ── */
var circleTask = {
  type: jsPsychCircleRotation,
  min_rounds: MIN_ROUNDS,
  time_limit_ms: TIME_LIMIT_MS
};

/* ── 3. Save data to OSF via DataPipe ── */
var save_data = {
  type: jsPsychPipe,
  action: "save",
  experiment_id: DATAPIPE_EXPERIMENT_ID,
  filename: filename,
  data_string: function () { return jsPsych.data.get().csv(); }
};

/* ── 4. Thank you screen ── */
var debrief = {
  type: jsPsychHtmlButtonResponse,
  stimulus: function () {
    var data = jsPsych.data.get().filter({ trial_type: 'circle-rotation' }).values()[0];
    return '<div class="end-screen">' +
      '<h1>Готово!</h1>' +
      '<p class="stat">Раундов завершено: <strong>' + data.rounds_completed + '</strong></p>' +
      '<p class="stat">Общее время: <strong>' + data.total_time_formatted + '</strong></p>' +
      '<p class="stat" style="margin-top:24px; color:#bbb;">Спасибо за участие.</p>' +
      '</div>';
  },
  choices: ['Закрыть']
};

/* ── Run ── */
jsPsych.run([welcome, circleTask, save_data, debrief]);

</script>
</html>
